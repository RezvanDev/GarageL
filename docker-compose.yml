version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: garage_user
      POSTGRES_PASSWORD: garage_password
      POSTGRES_DB: garage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - garage-network

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgres://garage_user:garage_password@db:5432/garage_db
      JWT_SECRET: ${JWT_SECRET:-garage_super_secret_key_2026}
      NODE_ENV: production
      PORT: 5001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - garage-network

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    networks:
      - garage-network

  admin:
    build: ./management-portal
    restart: always
    depends_on:
      - backend
    networks:
      - garage-network

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - garage-network

networks:
  garage-network:
    driver: bridge

volumes:
  postgres_data:
