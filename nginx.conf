events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 50M;

    # Backend API
    upstream backend_api {
        server backend:5001;
    }

    # Frontend Client
    upstream frontend_client {
        server frontend:80;
    }

    # Management Portal
    upstream admin_portal {
        server admin:80;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name guidex.pw;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main Site (guidex.pw)
    server {
        listen 443 ssl;
        server_name guidex.pw;

        ssl_certificate /etc/letsencrypt/live/guidex.pw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/guidex.pw/privkey.pem;

        # Client Portal (at root /)
        location / {
            proxy_pass http://frontend_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/v1/ {
            proxy_pass http://backend_api/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend Uploads
        location /uploads/ {
            proxy_pass http://backend_api/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Admin/Management Portal (guidex.pw:8443)
    server {
        listen 8443 ssl;
        server_name guidex.pw;

        ssl_certificate /etc/letsencrypt/live/guidex.pw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/guidex.pw/privkey.pem;

        location / {
            proxy_pass http://admin_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Also need API access on this port
        location /api/v1/ {
            proxy_pass http://backend_api/api/v1/;
            proxy_set_header Host $host;
        }

        # Also need Uploads access on this port
        location /uploads/ {
            proxy_pass http://backend_api/uploads/;
            proxy_set_header Host $host;
        }
    }
}
