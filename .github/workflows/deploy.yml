name: Deploy Garage Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Current user: $(whoami)"
            echo "Current directory: $(pwd)"
            
            # Try to find the directory automatically if fixed paths fail
            PROJECT_DIR=$(find ~ -name docker-compose.yml -exec dirname {} \; | grep "my-garage" | head -n 1)
            
            if [ -z "$PROJECT_DIR" ]; then
                PROJECT_DIR=$(find /root -name docker-compose.yml -exec dirname {} \; | grep "my-garage" | head -n 1 2>/dev/null)
            fi
            
            if [ -n "$PROJECT_DIR" ]; then
                echo "Found project directory at: $PROJECT_DIR"
                cd "$PROJECT_DIR"
                git reset --hard
                git pull origin main
                docker-compose up -d --build
            else
                echo "ERROR: Could not find my-garage directory with docker-compose.yml"
                ls -la ~
                exit 1
            fi
