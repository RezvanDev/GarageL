name: Deploy Garage Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to project directory (update path if different on server)
            cd ~/GarageL || cd ~/my-garage
            
            # Pull latest changes
            git pull origin main
            
            # Restart containers
            docker compose up -d --build
